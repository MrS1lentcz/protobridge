name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -timeout=120s

      - name: Test coverage
        run: |
          go test ./runtime/ -coverprofile=runtime.cov -count=1
          go test ./internal/generator/ -coverprofile=generator.cov -count=1
          go test ./internal/parser/ -coverprofile=parser.cov -count=1
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=runtime.cov | tail -1 >> $GITHUB_STEP_SUMMARY
          go tool cover -func=generator.cov | tail -1 >> $GITHUB_STEP_SUMMARY
          go tool cover -func=parser.cov | tail -1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  proto-check:
    name: Proto check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Build plugin
        run: go build -o bin/protoc-gen-protobridge ./cmd/protoc-gen-protobridge/

      - name: Verify plugin runs
        run: |
          echo "" | bin/protoc-gen-protobridge 2>&1 || true
          echo "Plugin binary OK"

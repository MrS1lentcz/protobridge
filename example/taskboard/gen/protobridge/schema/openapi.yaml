openapi: '3.1.0'
info:
  title: protobridge API
  version: '1.0.0'
paths:
  /api/v1/tasks:
    post:
      operationId: TaskService_CreateTask
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Validation Error
    get:
      operationId: TaskService_ListTasks
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: header
          required: true
          schema:
            type: string
        # query params from paging
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTasksResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Validation Error
  /api/v1/tasks/{task_id}:
    get:
      operationId: TaskService_GetTask
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Validation Error
    put:
      operationId: TaskService_UpdateTask
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Validation Error
    delete:
      operationId: TaskService_DeleteTask
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTaskResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Validation Error
components:
  schemas:
    CreateTaskRequest:
      type: object
      required:
        - title
        - priority
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        assignee_id:
          type: string
        tags:
          type: array
          items:
            type: string
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        status:
          type: string
          enum:
            - todo
            - in_progress
            - done
        assignee_id:
          type: string
        tags:
          type: array
          items:
            type: string
        file:
          $ref: '#/components/schemas/FileAttachment'
        link:
          $ref: '#/components/schemas/LinkAttachment'
        created_by:
          type: string
        updated_by:
          type: string
      oneOf:
        - required:
            - file
        - required:
            - link
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        status:
          type: string
          enum:
            - todo
            - in_progress
            - done
        assignee_id:
          type: string
        tags:
          type: array
          items:
            type: string
    DeleteTaskResponse:
      type: object
      properties:
        success:
          type: boolean
        deleted_by:
          type: string
    ListTasksResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
          format: int32
    FileAttachment:
      type: object
      properties:
        filename:
          type: string
        size_bytes:
          type: integer
          format: int64
        mime_type:
          type: string
    LinkAttachment:
      type: object
      properties:
        url:
          type: string
        title:
          type: string

# Generated by protoc-gen-protobridge. Adjust as needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: protobridge
  labels:
    app: protobridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: protobridge
  template:
    metadata:
      labels:
        app: protobridge
    spec:
      containers:
        - name: protobridge
          image: protobridge:latest
          ports:
            - containerPort: 8080
          env:
            - name: PROTOBRIDGE_PORT
              value: "8080"
            - name: PROTOBRIDGE_TASK_SERVICE_ADDR
              value: "task_service:50051"  # TODO: set actual address
            - name: PROTOBRIDGE_HEALTH_SERVICE_ADDR
              value: "health_service:50051"  # TODO: set actual address
            - name: PROTOBRIDGE_AUTH_SERVICE_ADDR
              value: "auth_service:50051"  # TODO: set actual address
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: protobridge
spec:
  selector:
    app: protobridge
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

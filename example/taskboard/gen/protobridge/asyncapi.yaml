asyncapi: '3.0.0'
info:
  title: protobridge WebSocket API
  version: '1.0.0'
  description: WebSocket endpoints generated by protobridge for streaming gRPC methods.
servers:
  default:
    host: localhost:8080
    protocol: ws
channels:
  taskServiceWatchTasks:
    address: /api/v1/tasks/watch
    description: 'TaskService.WatchTasks (server streaming)'
    messages:
      TaskEvent:
        $ref: '#/components/messages/TaskEvent'
  taskServiceTaskNotifications:
    address: /api/v1/tasks/notifications
    description: 'TaskService.TaskNotifications (server streaming)'
    messages:
      TaskEvent:
        $ref: '#/components/messages/TaskEvent'
  taskServiceBulkCreateTasks:
    address: /api/v1/tasks/bulk
    description: 'TaskService.BulkCreateTasks (client streaming)'
    messages:
      BulkCreateTaskRequest:
        $ref: '#/components/messages/BulkCreateTaskRequest'
  taskServiceTaskChat:
    address: /api/v1/tasks/{task_id}/chat
    description: 'TaskService.TaskChat (bidirectional streaming)'
    messages:
      ChatMessage:
        $ref: '#/components/messages/ChatMessage'
  taskServiceActivityFeed:
    address: /api/v1/tasks/feed
    description: 'TaskService.ActivityFeed (server streaming)'
    messages:
      TaskEvent:
        $ref: '#/components/messages/TaskEvent'
operations:
  taskServiceWatchTasksReceive:
    action: receive
    channel:
      $ref: '#/channels/taskServiceWatchTasks'
    summary: Receive TaskEvent events from server
  taskServiceTaskNotificationsReceive:
    action: receive
    channel:
      $ref: '#/channels/taskServiceTaskNotifications'
    summary: Receive TaskEvent events from server
  taskServiceBulkCreateTasksSend:
    action: send
    channel:
      $ref: '#/channels/taskServiceBulkCreateTasks'
    summary: Send BulkCreateTaskRequest messages to server
  taskServiceTaskChatSend:
    action: send
    channel:
      $ref: '#/channels/taskServiceTaskChat'
    summary: Send ChatMessage messages
  taskServiceTaskChatReceive:
    action: receive
    channel:
      $ref: '#/channels/taskServiceTaskChat'
    summary: Receive ChatMessage messages
  taskServiceActivityFeedReceive:
    action: receive
    channel:
      $ref: '#/channels/taskServiceActivityFeed'
    summary: Receive TaskEvent events from server
components:
  messages:
    TaskEvent:
      payload:
        $ref: '#/components/schemas/TaskEvent'
    BulkCreateTaskRequest:
      payload:
        $ref: '#/components/schemas/BulkCreateTaskRequest'
    ChatMessage:
      payload:
        $ref: '#/components/schemas/ChatMessage'
  schemas:
    WatchTasksRequest:
      type: object
    TaskEvent:
      type: object
      properties:
        event_type:
          type: string
        task:
          $ref: '#/components/schemas/Task'
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        status:
          type: string
          enum:
            - todo
            - in_progress
            - done
        assignee_id:
          type: string
        tags:
          type: array
          items:
            type: string
        created_by:
          type: string
        updated_by:
          type: string
      # oneof: attachment
    BulkCreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
    BulkCreateTaskResponse:
      type: object
      properties:
        created_count:
          type: integer
          format: int32
        ids:
          type: array
          items:
            type: string
    ChatMessage:
      type: object
      properties:
        content:
          type: string
        sender:
          type: string

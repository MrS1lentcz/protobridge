syntax = "proto3";

package taskboard.v1;

option go_package = "github.com/mrs1lentcz/protobridge/example/taskboard/gen/grpc/taskboard/v1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "protobridge/options.proto";
import "protobridge/events.proto";

// =============================================================================
// Enums
// =============================================================================

enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1 [(protobridge.x_var_name) = "low"];
  TASK_PRIORITY_MEDIUM = 2 [(protobridge.x_var_name) = "medium"];
  TASK_PRIORITY_HIGH = 3 [(protobridge.x_var_name) = "high"];
  TASK_PRIORITY_CRITICAL = 4 [(protobridge.x_var_name) = "critical"];
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_TODO = 1 [(protobridge.x_var_name) = "todo"];
  TASK_STATUS_IN_PROGRESS = 2 [(protobridge.x_var_name) = "in_progress"];
  TASK_STATUS_DONE = 3 [(protobridge.x_var_name) = "done"];
}

// =============================================================================
// Messages – Common
// =============================================================================

message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  TaskPriority priority = 4;
  TaskStatus status = 5;
  string assignee_id = 6;
  repeated string tags = 7;
  oneof attachment {
    FileAttachment file = 8;
    LinkAttachment link = 9;
  }
  string created_by = 10;
  string updated_by = 11;
}

message FileAttachment {
  string filename = 1;
  int64 size_bytes = 2;
  string mime_type = 3;
}

message LinkAttachment {
  string url = 1;
  string title = 2;
}

// =============================================================================
// Messages – Auth
// =============================================================================

message AuthRequest {
  map<string, string> headers = 1;
}

message AuthResponse {
  string user_id = 1;
  string username = 2;
  string role = 3;
}

// =============================================================================
// Messages – CRUD
// =============================================================================

message CreateTaskRequest {
  string title = 1 [(protobridge.required) = true];
  string description = 2;
  TaskPriority priority = 3 [(protobridge.required) = true];
  string assignee_id = 4;
  repeated string tags = 5;
}

message GetTaskRequest {
  // chat_id comes from path param, but we still need the message.
}

message UpdateTaskRequest {
  // task_id comes from path param.
  string title = 1;
  string description = 2;
  TaskPriority priority = 3;
  TaskStatus status = 4;
  string assignee_id = 5;
  repeated string tags = 6;
}

message DeleteTaskRequest {
  // task_id comes from path param.
}

message DeleteTaskResponse {
  bool success = 1;
  string deleted_by = 2;
}

message ListTasksRequest {
  Paging paging = 1;
  TaskStatus status_filter = 2;
  TaskPriority priority_filter = 3;
}

message Paging {
  int32 page = 1;
  int32 limit = 2;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  int32 total = 2;
}

// =============================================================================
// Messages – Streaming
// =============================================================================

message TaskEvent {
  string event_type = 1; // "created", "updated", "deleted"
  Task task = 2;
}

// =============================================================================
// Events – pub/sub via protoc-gen-events-go
// =============================================================================

// TaskCreatedEvent is emitted by the gRPC backend whenever a new task lands
// on the board. PUBLIC + BOTH means workers see it via the durable queue
// AND every connected browser receives a real-time WS notification.
message TaskCreatedEvent {
  option (protobridge.event) = {
    kind: BOTH
    visibility: PUBLIC
    description: "Fired when a task is created. Workers can pick it up from "
                 "the durable queue; UIs see a flash notification."
  };
  string task_id = 1;
  string title = 2;
  TaskPriority priority = 3;
}

// TaskCompletedEvent is a fan-out notification. No durable consumer needs
// it (status is already in the database), but every browser tab gets to
// celebrate the completion.
message TaskCompletedEvent {
  option (protobridge.event) = {
    kind: BROADCAST
    visibility: PUBLIC
  };
  string task_id = 1;
  string assignee_id = 2;
}

// TaskGCRequested is a worker-only signal — the housekeeping job that
// purges stale tasks. No browser cares, hence INTERNAL.
message TaskGCRequested {
  option (protobridge.event) = {
    kind: DURABLE
    durable_group: "task-gc"
    visibility: INTERNAL
  };
  int64 older_than_unix = 1;
}

message WatchTasksRequest {
  // Empty – subscribes to all events.
}

message BulkCreateTaskRequest {
  string title = 1;
  string description = 2;
  TaskPriority priority = 3;
}

message BulkCreateTaskResponse {
  int32 created_count = 1;
  repeated string ids = 2;
}

message ChatMessage {
  string content = 1;
  string sender = 2;
}

// =============================================================================
// Services
// =============================================================================

service AuthService {
  // The auth method – not exposed as REST.
  rpc Authenticate(AuthRequest) returns (AuthResponse) {
    option (protobridge.auth_method) = true;
  }
}

service TaskService {
  option (protobridge.display_name) = "Tasks";
  option (protobridge.path_prefix) = "/api/v1";

  // --- Unary CRUD ---

  // Creates a new task on the board. Returns the created task with its
  // server-assigned ID.
  rpc CreateTask(CreateTaskRequest) returns (Task) {
    option (google.api.http) = {post: "/tasks"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.mcp) = true;
  }

  // Returns a single task by ID.
  rpc GetTask(GetTaskRequest) returns (Task) {
    option (google.api.http) = {get: "/tasks/{task_id}"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.mcp) = true;
  }

  // Updates an existing task. Provide only the fields you want to change.
  rpc UpdateTask(UpdateTaskRequest) returns (Task) {
    option (google.api.http) = {put: "/tasks/{task_id}"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.mcp) = true;
  }

  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse) {
    option (google.api.http) = {delete: "/tasks/{task_id}"};
    option (protobridge.required_headers) = "user_id";
  }

  // Lists tasks for the authenticated user. Useful when the LLM needs an
  // overview of what's open before suggesting next actions.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {get: "/tasks"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.query_params_target) = "paging";
    option (protobridge.mcp) = true;
  }

  // --- Server streaming: watch task events (private WS – per user) ---

  rpc WatchTasks(WatchTasksRequest) returns (stream TaskEvent) {
    option (google.api.http) = {get: "/tasks/watch"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.ws_mode) = "private";
  }

  // --- Server streaming via SSE: live notifications ---

  rpc TaskNotifications(WatchTasksRequest) returns (stream TaskEvent) {
    option (google.api.http) = {get: "/tasks/notifications"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.sse) = true;
    option (protobridge.ws_mode) = "private";
  }

  // --- Client streaming: bulk create ---

  rpc BulkCreateTasks(stream BulkCreateTaskRequest) returns (BulkCreateTaskResponse) {
    option (google.api.http) = {post: "/tasks/bulk"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.ws_mode) = "private";
  }

  // --- Bidi streaming: task chat (private per user) ---

  rpc TaskChat(stream ChatMessage) returns (stream ChatMessage) {
    option (google.api.http) = {get: "/tasks/{task_id}/chat"};
    option (protobridge.required_headers) = "user_id";
    option (protobridge.ws_mode) = "private";
  }

  // --- Server streaming: public activity feed (broadcast to all) ---

  rpc ActivityFeed(WatchTasksRequest) returns (stream TaskEvent) {
    option (google.api.http) = {get: "/tasks/feed"};
    option (protobridge.ws_mode) = "broadcast";
  }
}

// TaskBroadcast is the system fan-out stream: every PUBLIC TaskCreatedEvent
// and TaskCompletedEvent published on the bus is forwarded to every connected
// browser tab. Backend serves this RPC via the generated bus→stream adapter
// (NewTaskBroadcastServer); gateway opens one stream per pod and fans out to
// WS clients.
service TaskBroadcast {
  option (protobridge.broadcast) = {route: "/api/events/tasks"};
  rpc Stream(google.protobuf.Empty) returns (stream TaskBroadcastEnvelope);
}

// TaskBroadcastEnvelope is the wire shape of one broadcast frame. Labels
// carry per-event metadata (e.g. assignee_id) the gateway uses to filter
// per-principal; clients also receive them in the JSON envelope for
// per-screen UX filtering.
message TaskBroadcastEnvelope {
  map<string, string> labels = 1;
  oneof event {
    TaskCreatedEvent task_created_event = 2;
    TaskCompletedEvent task_completed_event = 3;
  }
}

syntax = "proto3";

package testdata;

import "protobridge/options.proto";

option go_package = "github.com/mrs1lentcz/protobridge/runtime/testdata";

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1 [(protobridge.x_var_name) = "active"];
  STATUS_INACTIVE = 2 [(protobridge.x_var_name) = "inactive"];
}

// Color has no x_var_name aliases on any value — exercises the
// "no aliases, cache stores nil, second call returns from cache" path
// in enumAliases / reverseEnumAliases.
enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
}

message SimpleRequest {
  string name = 1;
  int32 age = 2;
  Status status = 3;
}

message NestedRequest {
  string title = 1;
  Paging paging = 2;
}

message Paging {
  int32 page = 1;
  int32 limit = 2;
}

message OneofResponse {
  string id = 1;
  oneof content {
    TextContent text = 2;
    ImageContent image = 3;
  }
}

message TextContent {
  string body = 1;
}

message ImageContent {
  string url = 1;
  int32 width = 2;
}

message SimpleResponse {
  string id = 1;
  string name = 2;
  Status status = 3;
}

// AllTypesRequest is used for testing parseFieldValue and isZero with all
// common proto scalar types.
message AllTypesRequest {
  string str_val = 1;
  bool bool_val = 2;
  int32 int32_val = 3;
  int64 int64_val = 4;
  uint32 uint32_val = 5;
  uint64 uint64_val = 6;
  float float_val = 7;
  double double_val = 8;
  bytes bytes_val = 9;
  Status enum_val = 10;
  Paging msg_val = 11;
}

// QueryRequest has a nested query params message with diverse types.
message QueryRequest {
  string id = 1;
  QueryParams params = 2;
}

// EnumContainerRequest exercises repeated and map enum field rewriting in
// the JSON enum-alias prepass.
message EnumContainerRequest {
  repeated Status statuses = 1;
  map<string, Status> by_name = 2;
}

// MapOnlyEnumRequest forces the descriptor walker through the map branch of
// descriptorHasAliases (no preceding scalar/repeated enum field that would
// short-circuit the walk).
message MapOnlyEnumRequest {
  map<string, Status> entries = 1;
}

// WrapperRequest forces the descriptor walker through the nested-message
// branch of fieldHasAliases — its only field is a message that itself
// transitively carries an alias-bearing enum.
message WrapperRequest {
  SimpleResponse inner = 1;
}

// ColorRequest carries an alias-free enum field so the cache-nil branch
// in enumAliases / reverseEnumAliases is hit on the second call.
message ColorRequest {
  Color color = 1;
}

message QueryParams {
  string search = 1;
  bool active = 2;
  int64 offset = 3;
  float score = 4;
  Status status = 5;
  uint32 page_size = 6;
  uint64 cursor = 7;
  double weight = 8;
  int32 page = 9;
}
